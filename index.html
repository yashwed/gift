<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yash - Professional Profile</title>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary-accent: #f1c40f; /* Gold */
            --ribbon-color: #e74c3c; /* Red */
            --text-main: #ffffff;
            --text-muted: #bdc3c7;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #000000; 
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* --- BACKGROUND ANIMATION --- */
        .bg-animation {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }
        
        .particle {
            position: absolute;
            background: rgba(241, 196, 15, 0.2);
            border-radius: 50%;
            animation: float 10s infinite linear;
        }
        .particle:nth-child(1) { width: 8px; height: 8px; left: 10%; animation-delay: 0s; }
        .particle:nth-child(2) { width: 15px; height: 15px; left: 30%; animation-delay: 3s; }
        .particle:nth-child(3) { width: 12px; height: 12px; left: 70%; animation-delay: 5s; }

        @keyframes float {
            0% { transform: translateY(110vh) scale(0); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }

        /* --- PROFILE CARD --- */
        .profile-card {
            background: rgba(25, 25, 25, 0.9); 
            backdrop-filter: blur(15px); 
            padding: 2.5rem;
            border-radius: 30px;
            border: 1px solid rgba(241, 196, 15, 0.3);
            width: 90%;
            max-width: 380px;
            text-align: center;
            z-index: 10; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        /* --- GIFT BOX DESIGN --- */
        .gift-box-container {
            width: 90px; height: 90px;
            background: var(--primary-accent); 
            border-radius: 15px;
            margin: 0 auto 1.5rem;
            position: relative;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px rgba(241, 196, 15, 0.4);
        }
        .gift-box-container::before {
            content: ''; position: absolute; width: 12px; height: 100%;
            background: var(--ribbon-color); left: 50%; transform: translateX(-50%);
        }
        .gift-box-container::after {
            content: ''; position: absolute; width: 100%; height: 12px;
            background: var(--ribbon-color); top: 50%; transform: translateY(-50%);
        }
        .gift-box-initials { font-size: 2.2rem; font-weight: 900; color: #000; z-index: 2; }

        h1 { font-size: 2rem; margin-bottom: 0.3rem; letter-spacing: 1px; }
        .id-badge { color: var(--primary-accent); font-size: 0.75rem; margin-bottom: 1.5rem; display: block; font-weight: bold; }
        
        .contact-box { 
            margin-bottom: 2rem; background: rgba(255,255,255,0.03); 
            padding: 1.2rem; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05);
        }

        /* --- RAZORPAY BUTTON STYLING --- */
        form {
            display: flex;
            justify-content: center;
            width: 100%;
        }
        .razorpay-payment-button {
            background-color: var(--primary-accent) !important;
            color: #000 !important;
            border: none !important;
            padding: 16px 20px !important;
            border-radius: 12px !important;
            font-size: 1.1rem !important;
            font-weight: 800 !important;
            width: 100% !important;
            cursor: pointer !important;
            box-shadow: 0 5px 20px rgba(241, 196, 15, 0.3) !important;
            transition: 0.3s ease !important;
            text-transform: uppercase;
        }
        .razorpay-payment-button:hover {
            background-color: #fff !important;
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(241, 196, 15, 0.5) !important;
        }

        .upi-text {
            font-size: 0.7rem; 
            color: var(--text-muted); 
            margin-top: 12px;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="bg-animation">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <div class="profile-card">
        <div class="gift-box-container">
            <span class="gift-box-initials">Y</span>
        </div>

        <h1>Yash</h1>
        <span class="id-badge">OFFICIAL MERCHANT</span>

        <div class="contact-box">
            <p style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 4px;">Verified Email:</p>
            <p style="font-weight: 600; color: var(--primary-accent);">yash.professional@email.com</p>
        </div>

        <form>
            <script src="https://checkout.razorpay.com/v1/payment-button.js" 
                    data-payment_button_id="pl_SWZ1cBPAy7fj28" async> 
            </script> 
        </form>
        
        <p class="upi-text">Supports UPI, Cards & Netbanking</p>
    </div>

</body>
</html>
