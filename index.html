<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yash's Birthday Adventure! 🎂</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; background: #000; overflow: hidden; font-family: 'Poppins', sans-serif; color: white; }

        /* --- BACKGROUND --- */
        #bg-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
            z-index: -1;
        }

        /* --- GIFT BOX STAGE --- */
        #gift-stage {
            height: 100vh;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            transition: all 0.8s ease;
        }

        .floating-gift {
            font-size: 100px;
            cursor: pointer;
            filter: drop-shadow(0 0 30px #f1c40f);
            animation: bounce 2s infinite ease-in-out;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .tap-text {
            margin-top: 20px;
            color: #f1c40f;
            font-weight: bold;
            letter-spacing: 2px;
            animation: blink 1.5s infinite;
        }
        @keyframes blink { 50% { opacity: 0.3; } }

        /* --- PAYMENT CARD (Hidden at start) --- */
        #payment-card {
            display: none;
            width: 90%; max-width: 400px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(241, 196, 15, 0.3);
            border-radius: 40px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: slideUp 0.8s ease forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- STICKER STYLING --- */
        .sticker-container {
            width: 150px;
            margin: 0 auto 15px auto;
            border-radius: 20px;
            overflow: hidden;
        }

        .razorpay-payment-button {
            background: linear-gradient(45deg, #f1c40f, #d4af37) !important;
            color: #000 !important;
            border-radius: 20px !important;
            font-weight: 900 !important;
            height: 55px !important;
            width: 100% !important;
            border: none !important;
            box-shadow: 0 10px 20px rgba(241, 196, 15, 0.2) !important;
        }
    </style>
</head>
<body>

    <div id="bg-canvas"></div>

    <div id="gift-stage">
        <div class="floating-gift" onclick="revealCard()">🎁</div>
        <p class="tap-text">TAP TO OPEN YASH'S GIFT</p>

        <div id="payment-card">
            <div class="sticker-container">
                <div class="tenor-gif-embed" data-postid="16010913896260583856" data-share-method="host" data-aspect-ratio="1" data-width="100%">
                    <a href="https://tenor.com/view/thank-you-everybody-vaani-kapoor-pinkvilla-i-appreciate-it-guys-gif-16010913896260583856">Thank You Sticker</a>
                </div>
                <script type="text/javascript" async src="https://tenor.com/embed.js"></script>
            </div>

            <h2 style="color: #f1c40f; margin-bottom: 10px;">For the Birthday Boy!</h2>
            <p style="font-size: 0.9rem; color: #ccc; margin-bottom: 25px; line-height: 1.4;">
                "Your support and love mean the world to me. Thanks for being part of my journey!"
            </p>

            <form>
                <script src="https://checkout.razorpay.com/v1/payment-button.js" 
                        data-payment_button_id="pl_SWZ1cBPAy7fj28" async> 
                </script> 
            </form>
        </div>
    </div>

    <script>
        function revealCard() {
            document.querySelector('.floating-gift').style.display = 'none';
            document.querySelector('.tap-text').style.display = 'none';
            document.getElementById('payment-card').style.display = 'block';
        }
    </script>

</body>
</html>
